name: Docker Build & Push to Docker Hub

on:
  # 代码推送到 main 分支时自动触发
  push:
    branches:
      - main
    # 只有以下文件变更时才触发，避免无意义构建
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  # 支持手动触发（可指定版本号）
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号（留空则自动从 package.json 读取）'
        required: false
        default: ''

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (读取版本号)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 读取版本号
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "构建版本: $VERSION"

      - name: Set up QEMU (多平台支持)
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v8.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cursor2api
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 启用构建缓存，加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 提高 QEMU 模拟稳定性
          provenance: false

      - name: 输出镜像信息
        run: |
          echo "================================================"
          echo "  镜像推送成功！"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/cursor2api:${{ steps.version.outputs.version }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/cursor2api:latest"
          echo "================================================"
