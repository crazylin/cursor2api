name: Build Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.6.7, leave empty to read from package.json)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Prune root devDependencies (slimmer bundled node_modules)
        run: npm prune --omit=dev

      - name: Sync desktop version from source
        shell: pwsh
        run: |
          $srcVer = (Get-Content package.json | ConvertFrom-Json).version
          $desktop = Get-Content desktop/package.json | ConvertFrom-Json
          $desktop.version = $srcVer
          $desktop | ConvertTo-Json -Depth 10 | Set-Content desktop/package.json
          Write-Host "Desktop version synced to: $srcVer"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Download standalone node.exe for bundling
        shell: pwsh
        run: |
          $nodeVer = '22.14.0'
          $url = "https://nodejs.org/dist/v$nodeVer/node-v$nodeVer-win-x64.zip"
          Write-Host "Downloading Node.js $nodeVer..."
          Invoke-WebRequest -Uri $url -OutFile node-win.zip -UseBasicParsing
          Expand-Archive -Path node-win.zip -DestinationPath node-tmp -Force
          New-Item -ItemType Directory -Force -Path desktop\node-bin | Out-Null
          Copy-Item "node-tmp\node-v$nodeVer-win-x64\node.exe" -Destination desktop\node-bin\node.exe
          Remove-Item node-win.zip, node-tmp -Recurse -Force
          Write-Host "node.exe bundled: $(Get-Item desktop\node-bin\node.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Create default config.yaml if missing
        shell: pwsh
        run: |
          if (-not (Test-Path config.yaml)) {
            'port: 3010' | Out-File -Encoding ascii config.yaml
            Write-Host 'Created default config.yaml'
          }

      - name: Download Tesseract traineddata
        shell: pwsh
        run: |
          $base = 'https://github.com/tesseract-ocr/tessdata_fast/raw/main'
          Write-Host 'Downloading eng.traineddata...'
          Invoke-WebRequest -Uri "$base/eng.traineddata" -OutFile eng.traineddata -UseBasicParsing
          Write-Host "eng.traineddata: $([Math]::Round((Get-Item eng.traineddata).Length/1MB,1)) MB"
          Write-Host 'Downloading chi_sim.traineddata...'
          Invoke-WebRequest -Uri "$base/chi_sim.traineddata" -OutFile chi_sim.traineddata -UseBasicParsing
          Write-Host "chi_sim.traineddata: $([Math]::Round((Get-Item chi_sim.traineddata).Length/1MB,1)) MB"

      - name: Build Windows installer
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Package dist.zip
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipPath = [System.IO.Path]::GetFullPath('dist.zip')
          if (Test-Path $zipPath) { Remove-Item $zipPath }
          $zip = [System.IO.Compression.ZipFile]::Open($zipPath, 'Create')
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, 'package.json', 'package.json') | Out-Null
          Get-ChildItem -Path dist -Recurse -File | ForEach-Object {
            $entryName = 'dist/' + $_.FullName.Substring((Get-Location).Path.Length + 6).Replace('\','/')
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $_.FullName, $entryName) | Out-Null
          }
          $zip.Dispose()
          Write-Host "dist.zip ready"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          if-no-files-found: error
          path: |
            dist.zip
            desktop/dist/*.exe
            desktop/dist/*.blockmap

  build-mac:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Prune root devDependencies (slimmer bundled node_modules)
        run: npm prune --omit=dev

      - name: Sync desktop version from source
        run: |
          SRC=$(node -p "require('./package.json').version")
          node -e "const fs=require('fs');const p=require('./desktop/package.json');p.version=process.argv[1];fs.writeFileSync('desktop/package.json',JSON.stringify(p,null,2)+'\n');" "$SRC"
          echo "Desktop version synced to: $SRC"

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Create default config.yaml if missing
        run: |
          if [ ! -f config.yaml ]; then echo 'port: 3010' > config.yaml && echo 'Created default config.yaml'; fi

      - name: Download Tesseract traineddata
        run: |
          curl -fsSL "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata" -o eng.traineddata
          curl -fsSL "https://github.com/tesseract-ocr/tessdata_fast/raw/main/chi_sim.traineddata" -o chi_sim.traineddata
          ls -la eng.traineddata chi_sim.traineddata

      - name: Build macOS installer
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac
          if-no-files-found: error
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.blockmap

  release:
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: version
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          INPUT_TAG="${{ github.event.inputs.tag }}"
          PUSH_TAG="${{ github.ref_name }}"
          if [[ "$PUSH_TAG" == v* ]]; then TAG="$PUSH_TAG"
          elif [[ -n "$INPUT_TAG" ]]; then TAG="$INPUT_TAG"
          else TAG="v${PKG_VER}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VER" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-win
          path: merge/win

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-mac
          path: merge/mac

      - name: Stage assets for GitHub Release
        shell: bash
        run: |
          mkdir -p staging
          for f in merge/win/dist.zip; do [ -f "$f" ] && cp -v "$f" staging/; done
          for f in merge/win/desktop/dist/*.exe merge/win/desktop/dist/*.blockmap; do
            [ -f "$f" ] && cp -v "$f" staging/
          done
          for f in merge/mac/desktop/dist/*.dmg merge/mac/desktop/dist/*.blockmap; do
            [ -f "$f" ] && cp -v "$f" staging/
          done
          echo "Staged:"
          ls -la staging/

      - name: Create or update Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          allowUpdates: true
          fail_on_unmatched_files: false
          files: |
            staging/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
