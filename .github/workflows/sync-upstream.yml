name: Sync Upstream Fork

on:
  schedule:
    # 每天 UTC 2:00 (北京时间 10:00) 自动检查上游更新
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  sync:
    name: Sync from upstream
    runs-on: ubuntu-latest
    outputs:
      # 将是否有新提交传递给下游 job
      has_new_commits: ${{ steps.sync.outputs.has_new_commits }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        id: sync
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 添加上游仓库（请将下方 URL 替换为实际上游仓库地址）
          UPSTREAM_REPO="https://github.com/7836246/cursor2api.git"
          git remote add upstream "$UPSTREAM_REPO" || true
          git fetch upstream

          LOCAL_SHA=$(git rev-parse HEAD)
          UPSTREAM_SHA=$(git rev-parse upstream/main 2>/dev/null || git rev-parse upstream/master)

          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "已是最新，无需同步。"
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
          else
            echo "检测到上游更新，开始合并..."
            UPSTREAM_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
            git merge upstream/$UPSTREAM_BRANCH --no-edit --allow-unrelated-histories
            git push origin HEAD
            echo "同步完成！"
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
          fi

  # 同步完成后触发镜像构建
  trigger-build:
    name: Trigger Docker Build
    needs: sync
    if: needs.sync.outputs.has_new_commits == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docker-publish workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'docker-publish.yml',
              ref: 'main'
            })
            console.log('已触发 docker-publish workflow')
